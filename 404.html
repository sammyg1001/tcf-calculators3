<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Title Company of Florida</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --gold: #b8962e;
      --gold-light: #d4af5a;
      --ink: #0e0e0e;
      --white: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--ink);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      overflow: hidden;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* big 404 */
    .big-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(100px, 22vw, 200px);
      font-weight: 700;
      line-height: 0.9;
      color: transparent;
      -webkit-text-stroke: 1px rgba(184, 150, 46, 0.25);
      letter-spacing: -0.04em;
      user-select: none;
      margin-bottom: 8px;
      position: relative;
    }

    .gold-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg,
          transparent,
          var(--gold),
          transparent);
      margin: 0 auto 28px;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 600;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    p {
      font-size: 14px;
      color: #666;
      font-weight: 300;
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto 40px;
    }

    /* buttons */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      border-radius: 5px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 12px 22px;
      transition:
        transform 0.2s,
        box-shadow 0.2s,
        background 0.2s;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--gold);
      color: var(--ink);
      box-shadow: 0 4px 18px rgba(184, 150, 46, 0.28);
    }

    .btn-primary:hover {
      background: var(--gold-light);
      box-shadow: 0 6px 24px rgba(184, 150, 46, 0.4);
    }

    .btn-ghost {
      background: transparent;
      color: #666;
      border: 1px solid #2a2a2a;
    }

    .btn-ghost:hover {
      border-color: #444;
      color: #aaa;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    /* footer note */
    .footer-note {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.08em;
    }

    @media (max-width: 480px) {
      .actions {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 220px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="big-num">404</div>
  <div class="gold-line"></div>

  <h1>Page not found</h1>
  <p>
    The page you're looking for doesn't exist or may have been moved. Head
    back to find what you need.
  </p>

  <div class="actions">
    <a class="btn btn-primary" href="/">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 8h10M3 8l4-4M3 8l4 4" />
      </svg>
      Back to Home
    </a>
    <a class="btn btn-ghost" href="/seller-net-sheet.html">Seller Calculator</a>
    <a class="btn btn-ghost" href="/buyer-closing-cost.html">Buyer Calculator</a>
  </div>

  <span class="footer-note">Title Company of Florida &nbsp;·&nbsp; titlecompanyofflorida.com</span>
</body>

</html>
